<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <style>
      * { box-sizing: border-box; }
      body { margin: 0; background: #1e1e1e; color: white; }
    </style>
  </head>
  <body>
    <script>
    ((() => {
      var futures = {};
      var par = window.parent;

      var handlers = {
        html(msg) {
          // Inject HTML
          var {mode, selector, content} = msg;
          mode ||= "append";
          var targets = selector
            ? Array.from(document.querySelectorAll(selector))
            : [document.body];
          var added = [];
          for (var target of targets) { added.push(...apply(target, mode, content)); }
          reportHeight();
          var pf = findPrimeFocus(added);
          if (pf) { pf.focus(); }
        },

        focus(_msg) {
          window.autofocus();
        },

        async exec(msg) {
          // Execute JavaScript; if response_id isn't null, respond with the result
          const {code, response_id, selector} = msg;
          const targets = selector
            ? Array.from(document.querySelectorAll(selector))
            : [null];
          if (response_id != null) {
            const fn = (0, eval)(`(function() { return (${code}); })`);
            try {
              const value = await Promise.all(targets.map(t => fn.call(t)));
              par.postMessage({ type: "response", response_id, value: selector ? value : value[0] }, "*");
            } catch (e) {
              par.postMessage({ type: "response", response_id, error: String(e) }, "*");
            }
          } else {
            const fn = (0, eval)(`(function() { ${code} })`);
            targets.forEach(t => fn.call(t));
          }
        },

        resolve(msg) {
          // Resolve the future with corresponding response_id
          const {response_id, value, error} = msg;
          const future = futures[response_id];
          if (future) {
            delete futures[response_id];
            if (error != null) { future.reject(error); }
            else { future.resolve(value); }
          }
        },

        register(msg) {
          // Register new handlers; values are function strings like "(msg) => {...}"
          for (const [type, code] of Object.entries(msg.handlers)) {
            handlers[type] = (0, eval)(`(${code})`);
          }
        },

        bucheInfo(msg) {
          window.bucheInfo = { maxHeight: msg.maxHeight };
        },
      }

      var lastHeight = null;
      function reportHeight() {
        var h = document.body.scrollHeight;
        if (h !== lastHeight) {
          lastHeight = h;
          par.postMessage({ type: "resize", height: h }, "*");
        }
      }

      new ResizeObserver(reportHeight).observe(document.body);

      // innerHTML / insertAdjacentHTML don't execute scripts — re-create them so they run.
      function runScripts(root) {
        for (var s of Array.from(root.querySelectorAll("script"))) {
          var ns = document.createElement("script");
          for (var a of s.attributes) { ns.setAttribute(a.name, a.value); }
          ns.textContent = s.textContent;
          s.replaceWith(ns);
        }
      }

      // Parse content into a detached div, activate scripts, then move nodes into
      // the live DOM so scripts execute exactly once on insertion.
      // Returns the array of top-level nodes that were added.
      function apply(target, mode, content) {
        var tmp = document.createElement("div");
        tmp.innerHTML = content;
        runScripts(tmp);
        var nodes = Array.from(tmp.childNodes);
        if (mode === "set") {
          target.innerHTML = "";
          target.append(...nodes);
        } else if (mode === "replace") {
          target.replaceWith(...nodes);
        } else {
          target.append(...nodes);
        }
        return nodes;
      }

      function findPrimeFocus(nodes) {
        for (var node of nodes) {
          if (node.nodeType !== 1) continue;
          if (node.id === "prime-focus") return node;
          var pf = node.querySelector("#prime-focus");
          if (pf) return pf;
        }
        return null;
      }

      window.addEventListener("message", (e) => {
        if (e.source !== par) { return; }
        var msg = e.data;
        handlers[msg.type](msg);
      });

      // API available to user scripts inside the iframe.
      window.autofocus = () => {
        var pf = document.getElementById("prime-focus");
        if (pf) { pf.focus(); }
      }
      window.buche = (data) => {
        par.postMessage({ type: "send", data: data }, "*");
      };
      window.buche.send = window.buche;
      window.buche.request = (data) => {
        const response_id = Math.random().toString(36).slice(2);
        const promise = new Promise((resolve, reject) => {
          futures[response_id] = { resolve, reject };
        });
        par.postMessage({ type: "send", data: {...data, response_id} }, "*");
        return promise;
      };

      par.postMessage({ type: "ready" }, "*");

      // Forward global buche key combos to the parent window so capture-phase
      // listeners on parent window still fire even when focus is inside this iframe.
      // Config is sent by the parent via a "buchekeysConfig" message.
      var keysConfig = { globalKeys: [], prefixKeys: [] };
      handlers.buchekeysConfig = function(msg) {
        keysConfig = { globalKeys: msg.globalKeys || [], prefixKeys: msg.prefixKeys || [] };
      };

      function matchesKey(e, k) {
        return e.key === k.key && e.ctrlKey === k.ctrlKey && e.shiftKey === k.shiftKey
          && e.altKey === k.altKey && e.metaKey === k.metaKey;
      }
      function forward(e) {
        e.preventDefault();
        e.stopPropagation();
        par.postMessage({ type: "keyforward", key: e.key, ctrlKey: e.ctrlKey, shiftKey: e.shiftKey, altKey: e.altKey, metaKey: e.metaKey }, "*");
      }

      var prefixActive = false;
      var prefixTimer = null;
      var prefixSubTimeout = 500;

      window.addEventListener("keydown", function(e) {
        if (["Control", "Shift", "Alt", "Meta"].includes(e.key)) return;

        if (prefixActive) {
          // Forward every non-modifier key to the parent.
          // No timer before the first sub-key; start the timer after the first one
          // so subsequent sub-keys must come within the timeout.
          forward(e);
          clearTimeout(prefixTimer);
          prefixTimer = setTimeout(function() { prefixActive = false; }, prefixSubTimeout);
          return;
        }

        var prefixKey = keysConfig.prefixKeys.find(function(k) { return matchesKey(e, k); });
        if (prefixKey) {
          forward(e);
          prefixActive = true;
          prefixSubTimeout = prefixKey.timeout;
          clearTimeout(prefixTimer);
          // No timeout yet — wait indefinitely for the first sub-key.
          return;
        }

        if (keysConfig.globalKeys.some(function(k) { return matchesKey(e, k); })) {
          forward(e);
        }
      }, true);
    })());
    </script>
  </body>
</html>
