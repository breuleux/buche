<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <style>
      * { box-sizing: border-box; }
      body { margin: 0; background: black; color: white; }
    </style>
  </head>
  <body>
    <script>
    ((() => {
      var futures = {};
      var par = window.parent;

      var handlers = {
        html(msg) {
          // Inject HTML
          var {mode, selector, content} = msg;
          mode ||= "append";
          var targets = selector
            ? Array.from(document.querySelectorAll(selector))
            : [document.body];
          for (var target of targets) { apply(target, mode, content); }
          reportHeight();
          var pf = document.getElementById("prime-focus");
          if (pf) { pf.focus(); }          
        },

        async exec(msg) {
          // Execute JavaScript; if response_id isn't null, respond with the result
          const {code, response_id} = msg;
          if (response_id != null) {
            try {
              const value = await (0, eval)(code);
              par.postMessage({ type: "response", response_id, value }, "*");
            } catch (e) {
              par.postMessage({ type: "response", response_id, error: String(e) }, "*");
            }
          } else {
            (0, eval)(code);
          }
        },

        resolve(msg) {
          // Resolve the future with corresponding response_id
          const {response_id, value, error} = msg;
          const future = futures[response_id];
          if (future) {
            delete futures[response_id];
            if (error != null) { future.reject(error); }
            else { future.resolve(value); }
          }
        },

        register(msg) {
          // Register new handlers; values are function strings like "(msg) => {...}"
          for (const [type, code] of Object.entries(msg.handlers)) {
            handlers[type] = (0, eval)(`(${code})`);
          }
        }
      }

      function reportHeight() {
        par.postMessage({ type: "resize", height: document.body.scrollHeight }, "*");
      }

      new ResizeObserver(reportHeight).observe(document.body);

      // innerHTML / insertAdjacentHTML don't execute scripts — re-create them so they run.
      function runScripts(root) {
        for (var s of Array.from(root.querySelectorAll("script"))) {
          var ns = document.createElement("script");
          for (var a of s.attributes) { ns.setAttribute(a.name, a.value); }
          ns.textContent = s.textContent;
          s.replaceWith(ns);
        }
      }

      // Parse content into a detached div, activate scripts, then move nodes into
      // the live DOM so scripts execute exactly once on insertion.
      function apply(target, mode, content) {
        var tmp = document.createElement("div");
        tmp.innerHTML = content;
        runScripts(tmp);
        var nodes = Array.from(tmp.childNodes);
        if (mode === "set") {
          target.innerHTML = "";
          target.append(...nodes);
        } else if (mode === "replace") {
          target.replaceWith(...nodes);
        } else {
          target.append(...nodes);
        }
      }

      window.addEventListener("message", (e) => {
        if (e.source !== par) { return; }
        var msg = e.data;
        handlers[msg.type](msg);
      });

      // API available to user scripts inside the iframe.
      window.buche = (data) => {
        par.postMessage({ type: "send", data: data }, "*");
      };
      window.buche.send = window.buche;
      window.buche.request = (data) => {
        const response_id = Math.random().toString(36).slice(2);
        const promise = new Promise((resolve, reject) => {
          futures[response_id] = { resolve, reject };
        });
        par.postMessage({ type: "send", data: {...data, response_id} }, "*");
        return promise;
      };

      par.postMessage({ type: "ready" }, "*");
    })());
    </script>
  </body>
</html>
